name: Prepare work

# Fetches, extracts, cleans, and modernises one catalogued work, then
# uploads the cleaned text and the raw-source provenance sidecar as a
# workflow artifact for human review. Run it from the Actions tab.
#
# Use this to finish a work without a local checkout:
#   1. Run with the work id. For an unpinned source the log prints the
#      SHA-256 to record in processing.source_sha256, and the sidecar in
#      the artifact records provider, identifier, URL, and digest.
#   2. Download the artifact for the rights inspection (no third-party
#      material) and the quality spot-check (ends, chapters, samples).
#   3. Commit the pin and review results to the manifest.
#
# Nothing is committed and nothing is published by this workflow.

on:
  workflow_dispatch:
    inputs:
      work_id:
        description: Work id (manifest filename without .yaml)
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: ofc validate
      - name: Prepare the work
        env:
          WORK_ID: ${{ inputs.work_id }}
        run: ofc prepare "$WORK_ID"
      - name: Upload prepared text and provenance for review
        uses: actions/upload-artifact@v4
        with:
          name: prepared-${{ inputs.work_id }}
          path: |
            workspace/clean/${{ inputs.work_id }}.txt
            workspace/raw/${{ inputs.work_id }}/*.provenance.json
          if-no-files-found: error
