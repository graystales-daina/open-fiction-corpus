  review_notes: Backlog pick (issue 27), edition 43936 selected over edition
    55 for wording fidelity (see rights.evidence). 153 inline illustration markers
    were audited individually (accounting for the marker-merging behavior of
    _strip_illustration_markers) for mid-sentence risk; the 8 markers not
    preceded by terminal punctuation all turned out to be dialogue-attribution
    paragraph breaks ("...she said,\n\nQUOTE"), which is this book's own
    established convention throughout (confirmed by grepping the same pattern
    dozens of times elsewhere with no illustration involved), so none needed
    a join override. 4 other flagged markers were 2-line chapter-heading
    continuations, confirmed safe. Prepared at 39,505 words.
