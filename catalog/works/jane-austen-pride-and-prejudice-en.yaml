  evidence:
    - The work was first published 28 January 1813, London, T. Egerton,
      anonymously ("By a Lady"); pre-1930 first publication places it in
      the United States public domain, and Project Gutenberg distributes
      ebook 1342 with a US public-domain clearance.
    - Jane Austen died on 18 July 1817, so life+70 protection expired on
      1 January 1888 in the UK and EU member states. Spain's transitional
      80-year post-mortem term (1879 Act, authors deceased before 7
      December 1987) expired on 1 January 1898, so there is no
      outstanding Article 10 (Directive 2006/116/EC) exception.
    - This specific Gutenberg transcription (ebook 1342) is the 1894
      George Allen "Peacock edition," which adds a critical preface by
      George Saintsbury and illustrations by Hugh Thomson. Both are
      independently public domain (Saintsbury died 1933, Thomson died
      1920; both clear US/UK/EU/Spain terms with no outstanding
      exception) but are third-party editorial/illustrative apparatus,
      not Austen's own text, and are excluded from the cleaned text
      during extraction rather than accepted into the corpus, per
      docs/review-checklist.md section 1.
    - A faithful transcription with trivial corrections does not meet the
      EU originality threshold for separate protection, and the UK
      typographical-arrangement right does not subsist in a plain-text
      file, so no separate transcription right is expected once the
      artifact inspection below confirms its contents.
  licence: null
  notes: The underlying 1813 work is public domain in every reviewed
    jurisdiction. The status stays uncertain only until the exact
    Gutenberg transcription (ebook 1342) is inspected to confirm the
    Saintsbury preface and Thomson illustrations are fully excludable and
    that no other third-party introductions, notes, or annotations
    remain; on a clean inspection it flips to public-domain with US, UK,
    and EU all verified (no jurisdiction carve-out). An alternate
    Gutenberg edition (#42671) was considered and rejected, since its
    metadata lists an editor, R. W. Chapman, suggesting the transcribed
    wording may follow Chapman's 1923 scholarly collation (Chapman died
    1960, not yet public domain in the UK/EU) rather than a plain
    reprint - a harder problem to exclude than an isolable preface block.

